<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Feast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a1628;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #game-container {
    position: relative;
    height: 90vh;
    width: 90vh;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  #game-container canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  #hud-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
  }
  #overlay.active {
    pointer-events: auto;
  }
  @media (max-width: 768px), (max-height: 500px) {
    #game-container { width: 100vw; height: 100vw; max-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="hud-canvas" width="600" height="600"></canvas>
  <div id="overlay"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 600;
const CANVAS_H = 600;
const WORLD_W = 6000;
const WORLD_H = 800;
const FIXED_DT = 1 / 60;
const PLAYER_SPEED = 3;
const SPRINT_SPEED = 5.4;
const SPRINT_MAX = 13;
const BITE_CHARGE_TIME = 2.0;
const BITE_DAMAGE_MULT = 1.5;
const BITE_RANGE = 30;

// ============================================================
// THREE.JS SETUP
// ============================================================
const container = document.getElementById('game-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a2848);
scene.fog = new THREE.FogExp2(0x061830, 0.0004);

const camera = new THREE.PerspectiveCamera(60, 1, 1, 8000);
camera.position.set(300, 120, 500);
camera.lookAt(300, 80, 300);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(600, 600);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = false;
container.insertBefore(renderer.domElement, container.firstChild);

// Lights
const ambientLight = new THREE.AmbientLight(0x4488cc, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xaaddff, 0.8);
dirLight.position.set(200, 600, 300);
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x88ccff, 0.3, 2000);
pointLight.position.set(3000, 600, 400);
scene.add(pointLight);

// ============================================================
// HUD CANVAS (2D overlay)
// ============================================================
const hudCanvas = document.getElementById('hud-canvas');
const ctx = hudCanvas.getContext('2d');

// ============================================================
// 3D ENVIRONMENT
// ============================================================

// Ocean floor
const floorGeom = new THREE.PlaneGeometry(WORLD_W + 400, 1200);
const floorMat = new THREE.MeshLambertMaterial({ color: 0xb08850 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(WORLD_W / 2, 0, 0);
scene.add(floor);

// Sand detail - darker patches
for (let i = 0; i < 40; i++) {
  const patchGeom = new THREE.PlaneGeometry(60 + Math.random() * 100, 30 + Math.random() * 60);
  const patchMat = new THREE.MeshLambertMaterial({ color: 0x8a6a40, transparent: true, opacity: 0.4 });
  const patch = new THREE.Mesh(patchGeom, patchMat);
  patch.rotation.x = -Math.PI / 2;
  patch.position.set(Math.random() * WORLD_W, 0.1, -300 + Math.random() * 600);
  scene.add(patch);
}

// Coral reef decorations
const coralColors = [0xff6688, 0xff9944, 0xffcc33, 0x44dd88, 0x8844ff, 0xff44aa, 0x44aaff, 0xee5533];
const coralGroup = new THREE.Group();
for (let x = 50; x < WORLD_W; x += 120 + Math.random() * 80) {
  const color = coralColors[Math.floor(Math.random() * coralColors.length)];
  const type = Math.floor(Math.random() * 3);
  const cGroup = new THREE.Group();

  if (type === 0) {
    // Sphere coral
    const g = new THREE.SphereGeometry(8 + Math.random() * 12, 8, 6);
    const m = new THREE.MeshLambertMaterial({ color });
    const mesh = new THREE.Mesh(g, m);
    mesh.scale.y = 0.6 + Math.random() * 0.4;
    cGroup.add(mesh);
  } else if (type === 1) {
    // Cylinder coral (tall)
    for (let j = 0; j < 2 + Math.floor(Math.random() * 3); j++) {
      const g = new THREE.CylinderGeometry(2, 3, 10 + Math.random() * 20, 6);
      const m = new THREE.MeshLambertMaterial({ color });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.set((Math.random() - 0.5) * 10, (5 + Math.random() * 10), (Math.random() - 0.5) * 10);
      cGroup.add(mesh);
    }
  } else {
    // Fan coral (flat cone)
    const g = new THREE.ConeGeometry(10 + Math.random() * 8, 15 + Math.random() * 15, 6);
    const m = new THREE.MeshLambertMaterial({ color });
    const mesh = new THREE.Mesh(g, m);
    mesh.position.y = 8;
    cGroup.add(mesh);
  }

  cGroup.position.set(x, 0, -200 + Math.random() * 400);
  coralGroup.add(cGroup);
}
scene.add(coralGroup);

// Water surface (semi-transparent plane at top)
const waterGeom = new THREE.PlaneGeometry(WORLD_W + 400, 1200);
const waterMat = new THREE.MeshLambertMaterial({
  color: 0x2090d0,
  transparent: true,
  opacity: 0.15,
  side: THREE.DoubleSide
});
const waterSurface = new THREE.Mesh(waterGeom, waterMat);
waterSurface.rotation.x = -Math.PI / 2;
waterSurface.position.set(WORLD_W / 2, 800, 0);
scene.add(waterSurface);

// Light rays (vertical translucent planes)
const rayGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
  const rayGeom = new THREE.PlaneGeometry(20, 800);
  const rayMat = new THREE.MeshBasicMaterial({
    color: 0x88ccff,
    transparent: true,
    opacity: 0.03,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  const ray = new THREE.Mesh(rayGeom, rayMat);
  ray.position.set(500 + i * 450, 400, -100 + Math.random() * 200);
  ray.rotation.z = (Math.random() - 0.5) * 0.2;
  rayGroup.add(ray);
}
scene.add(rayGroup);

// ============================================================
// BUBBLE PARTICLES (3D)
// ============================================================
let bubbles3D = [];
const bubbleGeom = new THREE.SphereGeometry(1, 6, 6);
const bubbleMat = new THREE.MeshBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.2,
  depthWrite: false
});

function initBubbles3D() {
  for (const b of bubbles3D) scene.remove(b.mesh);
  bubbles3D = [];
  for (let i = 0; i < 60; i++) {
    const mesh = new THREE.Mesh(bubbleGeom, bubbleMat.clone());
    const r = 1 + Math.random() * 3;
    mesh.scale.set(r, r, r);
    const bx = Math.random() * WORLD_W;
    const by = Math.random() * WORLD_H;
    const bz = -300 + Math.random() * 600;
    mesh.position.set(bx, by, bz);
    scene.add(mesh);
    bubbles3D.push({
      mesh,
      speed: 0.3 + Math.random() * 0.8,
      wobble: Math.random() * Math.PI * 2,
      baseX: bx,
      z: bz
    });
  }
}

function updateBubbles3D() {
  for (const b of bubbles3D) {
    b.mesh.position.y += b.speed;
    b.wobble += 0.03;
    b.mesh.position.x = b.baseX + Math.sin(b.wobble) * 3;
    if (b.mesh.position.y > WORLD_H + 10) {
      b.mesh.position.y = -10;
      b.baseX = Math.random() * WORLD_W;
      b.mesh.position.x = b.baseX;
      b.mesh.position.z = -300 + Math.random() * 600;
    }
  }
}

// ============================================================
// 3D MESH FACTORIES
// ============================================================

function createPiranhaMesh(skin) {
  const group = new THREE.Group();
  const isSkeleton = skin === 'skeleton';

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 12, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: isSkeleton ? 0xe8e0d0 : 0xff4400 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(20, 12, 10);
  group.add(body);

  // Belly
  const bellyGeom = new THREE.SphereGeometry(1, 10, 6);
  const bellyMat = new THREE.MeshLambertMaterial({ color: isSkeleton ? 0xf0e8d8 : 0xff8844 });
  const belly = new THREE.Mesh(bellyGeom, bellyMat);
  belly.scale.set(14, 6, 8);
  belly.position.set(2, -4, 0);
  group.add(belly);

  // Tail
  const tailGeom = new THREE.ConeGeometry(10, 16, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: isSkeleton ? 0xd0c8b8 : 0xcc3300 });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-26, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Dorsal fin
  const dorsalGeom = new THREE.ConeGeometry(6, 10, 4);
  const dorsalMat = new THREE.MeshLambertMaterial({ color: isSkeleton ? 0xc8c0b0 : 0xcc2200 });
  const dorsal = new THREE.Mesh(dorsalGeom, dorsalMat);
  dorsal.position.set(2, 14, 0);
  group.add(dorsal);

  // Eye (right)
  const eyeWhiteGeom = new THREE.SphereGeometry(3.5, 8, 8);
  const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const eyeR = new THREE.Mesh(eyeWhiteGeom, eyeWhiteMat);
  eyeR.position.set(10, 3, 8);
  group.add(eyeR);
  const pupilGeom = new THREE.SphereGeometry(1.8, 8, 8);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const pupilR = new THREE.Mesh(pupilGeom, pupilMat);
  pupilR.position.set(11, 3, 10);
  group.add(pupilR);

  // Eye (left)
  const eyeL = new THREE.Mesh(eyeWhiteGeom, eyeWhiteMat);
  eyeL.position.set(10, 3, -8);
  group.add(eyeL);
  const pupilL = new THREE.Mesh(pupilGeom, pupilMat);
  pupilL.position.set(11, 3, -10);
  group.add(pupilL);

  // Skeleton ribs
  if (isSkeleton) {
    const ribMat = new THREE.MeshBasicMaterial({ color: 0xb0a898 });
    for (let i = -2; i <= 2; i++) {
      const ribGeom = new THREE.CylinderGeometry(0.3, 0.3, 20, 4);
      const rib = new THREE.Mesh(ribGeom, ribMat);
      rib.position.set(i * 5, 0, 0);
      rib.rotation.x = Math.PI / 2;
      group.add(rib);
    }
  }

  // Bite indicator group (hidden by default)
  const biteGroup = new THREE.Group();
  biteGroup.visible = false;
  biteGroup.name = 'biteGroup';

  // Bite ring
  const ringGeom = new THREE.TorusGeometry(BITE_RANGE, 1.5, 8, 16, Math.PI * 1.2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, depthWrite: false });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.rotation.y = Math.PI / 2;
  ring.rotation.x = -Math.PI * 0.6;
  ring.position.set(20, 0, 0);
  ring.name = 'biteRing';
  biteGroup.add(ring);

  // Teeth on the ring
  const toothGeom = new THREE.ConeGeometry(2, 8, 4);
  const toothMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (let t = 0; t < 5; t++) {
    const angle = -0.6 + t * 0.3;
    const tooth = new THREE.Mesh(toothGeom, toothMat.clone());
    tooth.position.set(
      20 + Math.cos(angle) * BITE_RANGE,
      Math.sin(angle) * BITE_RANGE,
      0
    );
    tooth.rotation.z = angle - Math.PI / 2;
    tooth.name = 'tooth';
    biteGroup.add(tooth);
  }

  group.add(biteGroup);

  return group;
}

function createClownfishMesh() {
  const group = new THREE.Group();

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 10, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xff6600 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(12, 7, 6);
  group.add(body);

  // White stripes
  const stripeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const stripe1Geom = new THREE.BoxGeometry(2, 16, 14);
  const s1 = new THREE.Mesh(stripe1Geom, stripeMat);
  s1.position.set(-1, 0, 0);
  group.add(s1);
  const stripe2Geom = new THREE.BoxGeometry(1.5, 14, 12);
  const s2 = new THREE.Mesh(stripe2Geom, stripeMat);
  s2.position.set(5, 0, 0);
  group.add(s2);

  // Tail
  const tailGeom = new THREE.ConeGeometry(5, 10, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0xff8c00 });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-15, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Eyes
  const eyeGeom = new THREE.SphereGeometry(2, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(7, 2, 5);
  group.add(eyeR);
  const pupilGeom = new THREE.SphereGeometry(1, 6, 6);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const pupilR = new THREE.Mesh(pupilGeom, pupilMat);
  pupilR.position.set(7.5, 2, 6);
  group.add(pupilR);
  const eyeL = eyeR.clone();
  eyeL.position.set(7, 2, -5);
  group.add(eyeL);
  const pupilL = pupilR.clone();
  pupilL.position.set(7.5, 2, -6);
  group.add(pupilL);

  return group;
}

function createMediumFishMesh(color) {
  const group = new THREE.Group();
  const col = new THREE.Color(color);

  const bodyGeom = new THREE.SphereGeometry(1, 10, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: col });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(16, 9, 8);
  group.add(body);

  const tailGeom = new THREE.ConeGeometry(7, 14, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: col });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-20, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  const eyeGeom = new THREE.SphereGeometry(2.5, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(8, 2, 6);
  group.add(eyeR);
  const pupilGeom = new THREE.SphereGeometry(1.2, 6, 6);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const pupilR = new THREE.Mesh(pupilGeom, pupilMat);
  pupilR.position.set(8.5, 2, 7.5);
  group.add(pupilR);
  const eyeL = eyeR.clone();
  eyeL.position.set(8, 2, -6);
  group.add(eyeL);
  const pupilL = pupilR.clone();
  pupilL.position.set(8.5, 2, -7.5);
  group.add(pupilL);

  return group;
}

function createOrcaMesh() {
  const group = new THREE.Group();
  const sc = 0.5;

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 12, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(24 * sc, 12 * sc, 10 * sc);
  group.add(body);

  // White belly
  const bellyGeom = new THREE.SphereGeometry(1, 10, 6);
  const bellyMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const belly = new THREE.Mesh(bellyGeom, bellyMat);
  belly.scale.set(18 * sc, 6 * sc, 8 * sc);
  belly.position.set(2 * sc, -4 * sc, 0);
  group.add(belly);

  // White eye patch
  const patchGeom = new THREE.SphereGeometry(1, 8, 6);
  const patchMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const patchR = new THREE.Mesh(patchGeom, patchMat);
  patchR.scale.set(5 * sc, 3 * sc, 2 * sc);
  patchR.position.set(10 * sc, 4 * sc, 8 * sc);
  group.add(patchR);
  const patchL = patchR.clone();
  patchL.position.set(10 * sc, 4 * sc, -8 * sc);
  group.add(patchL);

  // Tail
  const tailGeom = new THREE.ConeGeometry(10 * sc, 18 * sc, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-28 * sc, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Dorsal fin (tall)
  const dorsalGeom = new THREE.ConeGeometry(4 * sc, 18 * sc, 4);
  const dorsalMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
  const dorsal = new THREE.Mesh(dorsalGeom, dorsalMat);
  dorsal.position.set(0, 16 * sc, 0);
  group.add(dorsal);

  // Eye
  const eyeGeom = new THREE.SphereGeometry(1.5 * sc, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(11 * sc, 4 * sc, 9 * sc);
  group.add(eyeR);
  const eyeL = eyeR.clone();
  eyeL.position.set(11 * sc, 4 * sc, -9 * sc);
  group.add(eyeL);

  return group;
}

function createWhaleMesh() {
  const group = new THREE.Group();
  const sc = 0.4;

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 12, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x4a6a8a });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(35 * sc, 16 * sc, 14 * sc);
  group.add(body);

  // Lighter belly
  const bellyGeom = new THREE.SphereGeometry(1, 10, 6);
  const bellyMat = new THREE.MeshLambertMaterial({ color: 0x8aaaba });
  const belly = new THREE.Mesh(bellyGeom, bellyMat);
  belly.scale.set(25 * sc, 8 * sc, 12 * sc);
  belly.position.set(5 * sc, -6 * sc, 0);
  group.add(belly);

  // Tail
  const tailGeom = new THREE.ConeGeometry(12 * sc, 20 * sc, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0x3a5a7a });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-40 * sc, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Mouth line (small cylinder)
  const mouthGeom = new THREE.CylinderGeometry(0.5 * sc, 0.5 * sc, 6 * sc, 4);
  const mouthMat = new THREE.MeshBasicMaterial({ color: 0x2a4a6a });
  const mouth = new THREE.Mesh(mouthGeom, mouthMat);
  mouth.rotation.x = Math.PI / 2;
  mouth.position.set(28 * sc, -2 * sc, 0);
  group.add(mouth);

  // Eyes
  const eyeGeom = new THREE.SphereGeometry(2 * sc, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(20 * sc, 4 * sc, 12 * sc);
  group.add(eyeR);
  const eyeL = eyeR.clone();
  eyeL.position.set(20 * sc, 4 * sc, -12 * sc);
  group.add(eyeL);

  return group;
}

function createMegalodonMesh() {
  const group = new THREE.Group();
  const sc = 0.35;

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 12, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x5a6a7a });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(30 * sc, 14 * sc, 12 * sc);
  group.add(body);

  // Lighter belly
  const bellyGeom = new THREE.SphereGeometry(1, 10, 6);
  const bellyMat = new THREE.MeshLambertMaterial({ color: 0x8a9aaa });
  const belly = new THREE.Mesh(bellyGeom, bellyMat);
  belly.scale.set(22 * sc, 7 * sc, 10 * sc);
  belly.position.set(4 * sc, -5 * sc, 0);
  group.add(belly);

  // Tail
  const tailGeom = new THREE.ConeGeometry(14 * sc, 22 * sc, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0x4a5a6a });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-36 * sc, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Dorsal fin (very tall)
  const dorsalGeom = new THREE.ConeGeometry(5 * sc, 22 * sc, 4);
  const dorsalMat = new THREE.MeshLambertMaterial({ color: 0x4a5a6a });
  const dorsal = new THREE.Mesh(dorsalGeom, dorsalMat);
  dorsal.position.set(0, 18 * sc, 0);
  group.add(dorsal);

  // Jaw/snout
  const jawGeom = new THREE.ConeGeometry(5 * sc, 12 * sc, 6);
  const jawMat = new THREE.MeshLambertMaterial({ color: 0x3a4a5a });
  const jaw = new THREE.Mesh(jawGeom, jawMat);
  jaw.rotation.z = -Math.PI / 2;
  jaw.position.set(28 * sc, -2 * sc, 0);
  group.add(jaw);

  // Teeth
  const toothGeom = new THREE.ConeGeometry(0.8 * sc, 3 * sc, 4);
  const toothMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (let t = 0; t < 5; t++) {
    const tooth = new THREE.Mesh(toothGeom, toothMat);
    tooth.position.set(24 * sc + t * 1.5 * sc, -5 * sc, 3 * sc);
    group.add(tooth);
    const tooth2 = tooth.clone();
    tooth2.position.set(24 * sc + t * 1.5 * sc, -5 * sc, -3 * sc);
    group.add(tooth2);
  }

  // Red eye
  const eyeGeom = new THREE.SphereGeometry(2.5 * sc, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xcc0000 });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(16 * sc, 3 * sc, 10 * sc);
  group.add(eyeR);
  const pupilGeom = new THREE.SphereGeometry(1.2 * sc, 6, 6);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const pupilR = new THREE.Mesh(pupilGeom, pupilMat);
  pupilR.position.set(16.5 * sc, 3 * sc, 11 * sc);
  group.add(pupilR);
  const eyeL = eyeR.clone();
  eyeL.position.set(16 * sc, 3 * sc, -10 * sc);
  group.add(eyeL);
  const pupilL = pupilR.clone();
  pupilL.position.set(16.5 * sc, 3 * sc, -11 * sc);
  group.add(pupilL);

  return group;
}

function createMosasaurusMesh() {
  const group = new THREE.Group();
  const sc = 0.3;

  // Body
  const bodyGeom = new THREE.SphereGeometry(1, 12, 8);
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x3a6a3a });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.scale.set(32 * sc, 12 * sc, 10 * sc);

  // Lighter belly
  const bellyGeom = new THREE.SphereGeometry(1, 10, 6);
  const bellyMat = new THREE.MeshLambertMaterial({ color: 0x6a9a6a });
  const belly = new THREE.Mesh(bellyGeom, bellyMat);
  belly.scale.set(24 * sc, 6 * sc, 8 * sc);
  belly.position.set(5 * sc, -5 * sc, 0);
  group.add(belly);

  // Tail (sinuous)
  const tailGeom = new THREE.ConeGeometry(8 * sc, 30 * sc, 4);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0x2a4a2a });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.set(-40 * sc, 0, 0);
  tail.name = 'tail';
  group.add(tail);

  // Head (distinct from body)
  const headGeom = new THREE.SphereGeometry(1, 10, 8);
  const headMat = new THREE.MeshLambertMaterial({ color: 0x3a6a3a });
  const head = new THREE.Mesh(headGeom, headMat);
  head.scale.set(12 * sc, 7 * sc, 8 * sc);
  head.position.set(26 * sc, -1 * sc, 0);
  group.add(head);

  // Flippers
  const flipperGeom = new THREE.SphereGeometry(1, 6, 4);
  const flipperMat = new THREE.MeshLambertMaterial({ color: 0x2a5a2a });
  const flipperR = new THREE.Mesh(flipperGeom, flipperMat);
  flipperR.scale.set(10 * sc, 3 * sc, 4 * sc);
  flipperR.position.set(-8 * sc, -8 * sc, 8 * sc);
  flipperR.rotation.z = 0.4;
  group.add(flipperR);
  const flipperL = flipperR.clone();
  flipperL.position.set(-8 * sc, -8 * sc, -8 * sc);
  flipperL.rotation.z = -0.4;
  group.add(flipperL);

  const flipperR2 = flipperR.clone();
  flipperR2.position.set(8 * sc, -8 * sc, 8 * sc);
  group.add(flipperR2);
  const flipperL2 = flipperL.clone();
  flipperL2.position.set(8 * sc, -8 * sc, -8 * sc);
  group.add(flipperL2);

  // Jaw
  const jawGeom = new THREE.ConeGeometry(4 * sc, 10 * sc, 6);
  const jawMat = new THREE.MeshLambertMaterial({ color: 0x2a4a2a });
  const jaw = new THREE.Mesh(jawGeom, jawMat);
  jaw.rotation.z = -Math.PI / 2;
  jaw.position.set(35 * sc, -2 * sc, 0);
  group.add(jaw);

  // Teeth
  const toothGeom = new THREE.ConeGeometry(0.6 * sc, 2.5 * sc, 4);
  const toothMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  for (let t = 0; t < 6; t++) {
    const tooth = new THREE.Mesh(toothGeom, toothMat);
    tooth.position.set(31 * sc + t * 1.5 * sc, -5 * sc, 2.5 * sc);
    group.add(tooth);
    const tooth2 = tooth.clone();
    tooth2.position.set(31 * sc + t * 1.5 * sc, -5 * sc, -2.5 * sc);
    group.add(tooth2);
  }

  // Yellow eye
  const eyeGeom = new THREE.SphereGeometry(2.5 * sc, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
  const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
  eyeR.position.set(30 * sc, 3 * sc, 7 * sc);
  group.add(eyeR);
  const pupilGeom = new THREE.SphereGeometry(1.2 * sc, 6, 6);
  const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const pupilR = new THREE.Mesh(pupilGeom, pupilMat);
  pupilR.position.set(30.5 * sc, 3 * sc, 8 * sc);
  group.add(pupilR);
  const eyeL = eyeR.clone();
  eyeL.position.set(30 * sc, 3 * sc, -7 * sc);
  group.add(eyeL);
  const pupilL = pupilR.clone();
  pupilL.position.set(30.5 * sc, 3 * sc, -8 * sc);
  group.add(pupilL);

  return group;
}

const entityMeshMap = new Map(); // entity -> mesh
let playerMesh = null;
let familyMeshes = [];

function getOrCreateMesh(entity) {
  if (entityMeshMap.has(entity)) return entityMeshMap.get(entity);

  let mesh;
  switch (entity.type) {
    case 'clam': mesh = createClamMesh(); break;
    case 'seashell': mesh = createSeashellMesh(); break;
    case 'clownfish': mesh = createClownfishMesh(); break;
    case 'meat': mesh = createMeatMesh(); break;
    case 'medfish': mesh = createMediumFishMesh(entity.color || '#668899'); break;
    case 'orca': mesh = createOrcaMesh(); break;
    case 'whale': mesh = createWhaleMesh(); break;
    case 'megalodon': mesh = createMegalodonMesh(); break;
    case 'mosasaurus': mesh = createMosasaurusMesh(); break;
    default: mesh = createMeatMesh(); break;
  }

  scene.add(mesh);
  entityMeshMap.set(entity, mesh);
  return mesh;
}

function cleanupMeshes() {
  const entitySet = new Set(entities);
  for (const [entity, mesh] of entityMeshMap) {
    if (!entitySet.has(entity)) {
      scene.remove(mesh);
      entityMeshMap.delete(entity);
    }
  }
}

function createPlayerMesh() {
  if (playerMesh) scene.remove(playerMesh);
  const skin = selectedFish === 0 ? SHOP_FISH[0].skins[selectedSkin] : 'normal';
  playerMesh = createPiranhaMesh(skin);
  scene.add(playerMesh);
}

function createFamilyMeshes() {
  for (const m of familyMeshes) scene.remove(m);
  familyMeshes = [];
  for (let i = 0; i < family.length; i++) {
    const mesh = createPiranhaMesh('normal');
    scene.add(mesh);
    familyMeshes.push(mesh);
  }
}

// ============================================================
// WORLD COORD -> 3D POSITION
// ============================================================
// Game world: x is horizontal (0..6000), y is vertical (0=top, 800=bottom)
// Three.js: x = game x, y = game (WORLD_H - y) so bottom=0 top=800, z = depth variation
function worldToScene(wx, wy) {
  return { x: wx, y: WORLD_H - wy, z: 0 };
}

// ============================================================
// CAMERA UPDATE (3D)
// ============================================================
const camTarget = new THREE.Vector3();
const camPos = new THREE.Vector3();

function updateCamera3D() {
  const pos = worldToScene(player.x, player.y);
  const dir = player.facingRight ? 1 : -1;

  // Target: slightly ahead of the player
  camTarget.set(pos.x + dir * 60, pos.y, 0);

  // Camera position: behind and above and to the side
  const desiredX = pos.x - dir * 180;
  const desiredY = pos.y + 120;
  const desiredZ = 280;

  // Smooth follow
  camPos.x += (desiredX - camPos.x) * 0.04;
  camPos.y += (desiredY - camPos.y) * 0.04;
  camPos.z += (desiredZ - camPos.z) * 0.04;

  camera.position.copy(camPos);
  camera.lookAt(camTarget);
}

let respawnQueue = [];

function queueRespawn(entity) {
  if (entity.respawnTime) {
    respawnQueue.push({
      type: entity.type,
      x: entity.respawnX,
      y: entity.respawnY,
      timer: entity.respawnTime
    });
  }
}

function updateRespawns() {
  for (let i = respawnQueue.length - 1; i >= 0; i--) {
    respawnQueue[i].timer -= FIXED_DT;
    if (respawnQueue[i].timer <= 0) {
      const r = respawnQueue[i];
      if (r.type === 'orca') spawnOrca(r.x, r.y);
      else if (r.type === 'whale') spawnWhale(r.x, r.y);
      else if (r.type === 'megalodon') spawnMegalodon(r.x, r.y);
      else if (r.type === 'mosasaurus') spawnMosasaurus(r.x, r.y);
      respawnQueue.splice(i, 1);
    }
  }
}

// AUDIO
// ============================================================
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startUnderwaterAmbient();
}

function startUnderwaterAmbient() {
  const bufSize = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 300;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.06;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

function playBite() {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * 0.08;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 600;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.2;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

function playCoin() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 1000;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playDamage() {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * 0.1;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.25;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

const keysDown = {};
let mouseDown = false;
let mouseHoldTime = 0;

// Use the renderer's canvas for input
const gameCanvas = renderer.domElement;
// Make overlay handle pointer events for menus
const overlay = document.getElementById('overlay');

document.addEventListener('keydown', (e) => {
  if (!gameStarted) {
    gameStarted = true;
    initAudio();
    return;
  }
  initAudio();
  keysDown[e.code] = true;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
    player.sprinting = !player.sprinting;
  }
  if (e.code === 'KeyF') {
    familyActive = !familyActive;
  }
});
document.addEventListener('keyup', (e) => { keysDown[e.code] = false; });

function handlePointerDown(e) {
  e.preventDefault();
  if (!gameStarted) {
    gameStarted = true;
    initAudio();
    return;
  }
  initAudio();
  if (gameState === STATE_SHOP) {
    const pos = getClickPos(e);
    handleShopClick(pos);
    return;
  }
  if (gameState === STATE_DEAD) {
    const pos = getClickPos(e);
    const panelH = 200;
    const panelY = (CANVAS_H - panelH) / 2 - 20;
    const btnW = 180;
    const btnX = (CANVAS_W - btnW) / 2;
    if (hitBtn(pos, btnX, panelY + 105, btnW, 32)) { respawnPlayer(); return; }
    if (hitBtn(pos, btnX, panelY + 145, btnW, 32)) { gameState = STATE_SHOP; return; }
    return;
  }
  mouseDown = true; mouseHoldTime = 0;
}

function handlePointerUp(e) {
  mouseDown = false; mouseHoldTime = 0;
}

// Attach to container so it catches both the WebGL canvas and overlay
container.addEventListener('mousedown', handlePointerDown);
container.addEventListener('mouseup', handlePointerUp);
container.addEventListener('touchstart', handlePointerDown, { passive: false });
container.addEventListener('touchend', handlePointerUp);

function getClickPos(e) {
  const rect = container.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  if (e.touches) {
    return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
  }
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

function hitBtn(pos, bx, by, bw, bh) {
  return pos.x >= bx && pos.x <= bx + bw && pos.y >= by && pos.y <= by + bh;
}

function updatePlayerInput() {
  if (!player.alive) return;
  const speed = player.sprinting && player.staminaLeft > 0 ? SPRINT_SPEED : PLAYER_SPEED;

  player.vx = 0;
  player.vy = 0;
  if (keysDown['ArrowLeft'] || keysDown['KeyA']) player.vx = -speed;
  if (keysDown['ArrowRight'] || keysDown['KeyD']) player.vx = speed;
  if (keysDown['ArrowUp'] || keysDown['KeyW']) player.vy = -speed;
  if (keysDown['ArrowDown'] || keysDown['KeyS']) player.vy = speed;

  if (player.vx !== 0 && player.vy !== 0) {
    player.vx *= 0.707;
    player.vy *= 0.707;
  }

  if (player.vx > 0) player.facingRight = true;
  if (player.vx < 0) player.facingRight = false;

  if (player.sprinting && player.staminaLeft > 0) {
    player.staminaLeft -= FIXED_DT;
    if (player.staminaLeft <= 0) {
      player.staminaLeft = 0;
      player.sprinting = false;
    }
  } else if (!player.sprinting && player.staminaLeft < SPRINT_MAX) {
    player.staminaLeft += FIXED_DT * 0.5;
    if (player.staminaLeft > SPRINT_MAX) player.staminaLeft = SPRINT_MAX;
  }

  if (mouseDown) {
    mouseHoldTime += FIXED_DT;
  }

  player.biting = mouseDown;
  player.biteCharged = mouseHoldTime >= BITE_CHARGE_TIME;
}

function updatePlayer() {
  if (!player.alive) return;
  player.x += player.vx;
  player.y += player.vy;
  player.x = Math.max(20 * player.size, Math.min(WORLD_W - 20 * player.size, player.x));
  player.y = Math.max(20 * player.size, Math.min(WORLD_H - 60 - 12 * player.size, player.y));
  player.swimTimer += FIXED_DT;
}

// ============================================================
// ENTITY AI UPDATE
// ============================================================
function updateEntities() {
  for (const e of entities) {
    if (e.type === 'clownfish') {
      e.turnTimer -= FIXED_DT;
      if (e.turnTimer <= 0) {
        e.vx = (Math.random() - 0.5) * 1.5;
        e.vy = (Math.random() - 0.5) * 0.5;
        e.turnTimer = 2 + Math.random() * 3;
      }
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 30 || e.x > WORLD_W - 30) e.vx *= -1;
      if (e.y < 30 || e.y > WORLD_H - 80) e.vy *= -1;
      e.swimTimer += FIXED_DT;
    }
    if (e.type === 'meat') {
      e.vy += 0.02;
      e.vx *= 0.99;
      e.x += e.vx;
      e.y += e.vy;
      if (e.y > WORLD_H - 65) { e.y = WORLD_H - 65; e.vy = 0; }
      e.lifetime -= FIXED_DT;
      if (e.lifetime <= 0) { e.health = -1; }
    }

    if (e.type === 'medfish') {
      e.swimTimer += FIXED_DT;
      e.turnTimer -= FIXED_DT;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) {
        if (player.size > e.size * 1.3) {
          e.vx += (e.x - player.x) * 0.005;
          e.vy += (e.y - player.y) * 0.005;
        } else if (e.size > player.size * 1.3) {
          e.vx += dx * 0.003;
          e.vy += dy * 0.003;
        }
      } else if (e.turnTimer <= 0) {
        e.vx = (Math.random() - 0.5) * 2;
        e.vy = (Math.random() - 0.5) * 0.5;
        e.turnTimer = 3 + Math.random() * 4;
      }
      const maxSpd = 2;
      const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
      if (spd > maxSpd) { e.vx *= maxSpd / spd; e.vy *= maxSpd / spd; }
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 30 || e.x > WORLD_W - 30) e.vx *= -1;
      if (e.y < 30 || e.y > WORLD_H - 80) e.vy *= -1;
    }

    if (e.type === 'orca') {
      e.swimTimer += FIXED_DT;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < e.aggroRange) {
        e.vx += dx * 0.004;
        e.vy += dy * 0.004;
      } else {
        e.turnTimer -= FIXED_DT;
        if (e.turnTimer <= 0) {
          e.vx = (Math.random() - 0.5) * 3;
          e.vy = (Math.random() - 0.5) * 1;
          e.turnTimer = 4 + Math.random() * 4;
        }
      }
      const maxSpd = 2.5;
      const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
      if (spd > maxSpd) { e.vx *= maxSpd / spd; e.vy *= maxSpd / spd; }
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 30 || e.x > WORLD_W - 30) e.vx *= -1;
      if (e.y < 30 || e.y > WORLD_H - 80) e.vy *= -1;
    }

    if (e.type === 'whale') {
      e.swimTimer += FIXED_DT;
      e.turnTimer -= FIXED_DT;
      if (e.turnTimer <= 0) {
        e.vx = (Math.random() > 0.5 ? 0.3 : -0.3);
        e.vy = (Math.random() - 0.5) * 0.2;
        e.turnTimer = 6 + Math.random() * 8;
      }
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 60 || e.x > WORLD_W - 60) e.vx *= -1;
      if (e.y < 60 || e.y > WORLD_H - 100) e.vy *= -1;
      if (player.size < 1.5 && player.alive) {
        const sdx = e.x + (e.vx > 0 ? 30 : -30) * e.size * 0.4 - player.x;
        const sdy = e.y - player.y;
        const sdist = Math.sqrt(sdx * sdx + sdy * sdy);
        if (sdist < e.suckRange && sdist > 5) {
          player.x += sdx / sdist * e.suckForce;
          player.y += sdy / sdist * e.suckForce;
        }
      }
    }

    if (e.type === 'megalodon' || e.type === 'mosasaurus') {
      e.swimTimer += FIXED_DT;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < e.aggroRange && player.alive) {
        e.vx += dx * 0.003;
        e.vy += dy * 0.003;
      } else {
        e.turnTimer -= FIXED_DT;
        if (e.turnTimer <= 0) {
          e.vx = (Math.random() - 0.5) * 4;
          e.vy = (Math.random() - 0.5) * 1.5;
          e.turnTimer = 3 + Math.random() * 5;
        }
      }
      const maxSpd = e.type === 'mosasaurus' ? 3.0 : 2.8;
      const spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
      if (spd > maxSpd) { e.vx *= maxSpd / spd; e.vy *= maxSpd / spd; }
      e.x += e.vx;
      e.y += e.vy;
      if (e.x < 80 || e.x > WORLD_W - 80) e.vx *= -1;
      if (e.y < 40 || e.y > WORLD_H - 100) e.vy *= -1;
    }
  }
  for (let i = entities.length - 1; i >= 0; i--) {
    if (entities[i].health < 0) entities.splice(i, 1);
  }
}

function updateFishCombat() {
  for (let i = entities.length - 1; i >= 0; i--) {
    const a = entities[i];
    if (!a || !['medfish', 'orca', 'megalodon', 'mosasaurus'].includes(a.type)) continue;

    for (let j = entities.length - 1; j >= 0; j--) {
      if (i === j) continue;
      const b = entities[j];
      if (!b || b.type === 'meat' || b.type === 'clam' || b.type === 'seashell') continue;

      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const contactDist = 15 * a.size + 15 * b.size;

      if (dist < contactDist && a.size > b.size * 1.3) {
        b.health -= a.size * 2 * FIXED_DT;

        if (b.health <= 0) {
          if (b.meatCount) {
            dropMeat(b.x, b.y, b.meatCount, b.size);
          } else {
            spawnMeat(b.x, b.y, b.size * 0.5);
          }
          if (b.respawnTime) queueRespawn(b);
          entities.splice(j, 1);
          if (j < i) i--;
          break;
        }
      }
    }
  }
}

function updateBiteCollision() {
  player.canHitSomething = false;
  if (!player.biting || !player.alive) return;

  const dir = player.facingRight ? 1 : -1;
  const mouthX = player.x + dir * 20 * player.size;
  const mouthY = player.y;
  const range = BITE_RANGE * player.size;

  for (let i = entities.length - 1; i >= 0; i--) {
    const e = entities[i];
    const dx = e.x - mouthX;
    const dy = e.y - mouthY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitDist = range + 10 * e.size;

    if (dist < hitDist) {
      player.canHitSomething = true;

      if (e.type === 'meat' && e.size > player.size * 0.8) {
        if (mouseHoldTime < FIXED_DT * 2) {
          const halfSize = e.size / 2;
          spawnMeat(e.x - 10, e.y, halfSize);
          spawnMeat(e.x + 10, e.y, halfSize);
          entities.splice(i, 1);
        }
        break;
      }

      if (!['clam', 'seashell', 'meat'].includes(e.type) && mouseHoldTime < FIXED_DT * 2 && !player.latchTarget) {
        player.latchTarget = e;
        player.latchTimer = 0;
        player.latchOffsetX = player.x - e.x;
        player.latchOffsetY = player.y - e.y;
        playBite();
        break;
      }

      if (mouseHoldTime < FIXED_DT * 2) {
        const dmg = player.biteCharged ? player.biteForce * BITE_DAMAGE_MULT : player.biteForce;
        e.health -= dmg;
        playBite();

        if (e.health <= 0) {
          if (e.meatCount) {
            dropMeat(e.x, e.y, e.meatCount, e.size);
          } else {
            player.coins += e.coins;
            playCoin();
            coinsThisRun += e.coins;
            player.biteForce += e.bfGain;
            player.maxHealth += e.hpGain;
            player.health = Math.min(player.health + e.hpGain, player.maxHealth);
            player.size += e.sizeGain;
            localStorage.setItem('deepFeastCoins', player.coins);
          }
          if (e.type === 'megalodon') localStorage.setItem('deepFeastMegaKill', '1');
          if (e.type === 'mosasaurus') localStorage.setItem('deepFeastMosaKill', '1');
          queueRespawn(e);
          entities.splice(i, 1);
        }
      }
      break;
    }
  }
}

function updateLatch() {
  if (!player.latchTarget || !player.alive) { player.latchTarget = null; return; }
  const e = player.latchTarget;

  if (!entities.includes(e) || e.health <= 0) {
    player.latchTarget = null;
    return;
  }

  player.x = e.x + player.latchOffsetX;
  player.y = e.y + player.latchOffsetY;

  const dps = player.biteCharged ? player.biteForce * BITE_DAMAGE_MULT : player.biteForce;
  e.health -= dps * FIXED_DT;

  player.latchTimer += FIXED_DT;

  if (player.latchTimer >= player.latchMaxTime) {
    player.latchTarget = null;
  }

  if (!mouseDown && player.latchTimer > 0.2) {
    player.latchTarget = null;
  }

  if (e.health <= 0) {
    if (e.meatCount) dropMeat(e.x, e.y, e.meatCount, e.size);
    if (!e.meatCount) {
      player.coins += e.coins;
      coinsThisRun += e.coins;
      player.biteForce += e.bfGain;
      player.maxHealth += e.hpGain;
      player.health = Math.min(player.health + e.hpGain, player.maxHealth);
      player.size += e.sizeGain;
      localStorage.setItem('deepFeastCoins', player.coins);
      playCoin();
    }
    if (e.type === 'megalodon') localStorage.setItem('deepFeastMegaKill', '1');
    if (e.type === 'mosasaurus') localStorage.setItem('deepFeastMosaKill', '1');
    queueRespawn(e);
    entities.splice(entities.indexOf(e), 1);
    player.latchTarget = null;
  }
}

let lastDmgSound = 0;

function updateEnemyDamage() {
  if (!player.alive) return;
  for (const e of entities) {
    if (!e.damage) continue;
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitDist = (20 * player.size + 15 * e.size);
    if (dist < hitDist) {
      player.health -= e.damage * FIXED_DT;
      player.latchTarget = null;
      if (Date.now() - lastDmgSound > 500) { playDamage(); lastDmgSound = Date.now(); }
      if (player.health <= 0) {
        player.health = 0;
        player.alive = false;
        gameState = STATE_DEAD;
      }
    }
  }
}

function updateFamily() {
  if (!player.alive) return;
  for (let i = 0; i < family.length; i++) {
    const f = family[i];
    f.swimTimer += FIXED_DT;

    if (familyActive) {
      const offsetX = -30 - (i % 3) * 25;
      const offsetY = (i - family.length / 2) * 20;
      const targetX = player.x + (player.facingRight ? offsetX : -offsetX);
      const targetY = player.y + offsetY;
      const dx = targetX - f.x;
      const dy = targetY - f.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 5) {
        const spd = PLAYER_SPEED * f.speedMult;
        f.x += (dx / dist) * Math.min(spd, dist * 0.1);
        f.y += (dy / dist) * Math.min(spd, dist * 0.1);
      }
    } else {
      f.x += Math.sin(f.swimTimer * 2 + i) * 0.3;
      f.y += Math.cos(f.swimTimer * 1.5 + i) * 0.2;
    }

    f.x = Math.max(20, Math.min(WORLD_W - 20, f.x));
    f.y = Math.max(20, Math.min(WORLD_H - 80, f.y));
  }
}

function replenishFood() {
  let clamCount = 0, clownCount = 0;
  for (const e of entities) {
    if (e.type === 'clam' || e.type === 'seashell') clamCount++;
    if (e.type === 'clownfish') clownCount++;
  }
  if (clamCount < 30) {
    const x = Math.random() * WORLD_W;
    if (Math.random() > 0.5) spawnClam(x, WORLD_H - 70 + Math.random() * 10);
    else spawnSeashell(x, WORLD_H - 68 + Math.random() * 8);
  }
  if (clownCount < 40) {
    spawnClownfish(Math.random() * WORLD_W, 100 + Math.random() * (WORLD_H - 250));
  }
}

function respawnPlayer() {
  player.x = 300;
  player.y = 400;
  player.size = [1.0, 1.3, 2.5, 2.8, 3.5][selectedFish];
  player.biteForce = [10, 15, 20, 35, 50][selectedFish];
  player.maxHealth = [100, 150, 300, 500, 800][selectedFish];
  player.health = player.maxHealth;
  player.alive = true;
  player.sprinting = false;
  player.staminaLeft = SPRINT_MAX;
  coinsThisRun = 0;
  respawnQueue = [];
  gameState = STATE_PLAYING;
  initEntities();
  initFamily();
  initBubbles();
  createPlayerMesh();
  createFamilyMeshes();
}

function handleShopClick(pos) {
  const cardW = 250;
  const cardH = 55;
  const startX = (CANVAS_W - cardW) / 2;
  const startY = 90;
  const gap = 62;

  for (let i = 0; i < SHOP_FISH.length; i++) {
    const cy = startY + i * gap;
    if (hitBtn(pos, startX, cy, cardW, cardH)) {
      const fish = SHOP_FISH[i];
      const owned = ownedFish.includes(i);

      if (owned) {
        selectedFish = i;
        localStorage.setItem('deepFeastFish', selectedFish);
        if (i === 0) {
          selectedSkin = (selectedSkin + 1) % SHOP_FISH[0].skins.length;
          localStorage.setItem('deepFeastSkin', selectedSkin);
        }
      } else {
        const canBuy = player.coins >= fish.cost && (!fish.requireKill || localStorage.getItem(fish.requireKill));
        if (canBuy) {
          player.coins -= fish.cost;
          ownedFish.push(i);
          selectedFish = i;
          localStorage.setItem('deepFeastCoins', player.coins);
          localStorage.setItem('deepFeastOwned', JSON.stringify(ownedFish));
          localStorage.setItem('deepFeastFish', selectedFish);
        }
      }
      return;
    }
  }

  const backW = 120;
  const backH = 32;
  const backX = (CANVAS_W - backW) / 2;
  const backY = CANVAS_H - 60;
  if (hitBtn(pos, backX, backY, backW, backH)) {
    gameState = STATE_DEAD;
  }
}

// ============================================================
// 3D SYNC - update mesh positions from game state
// ============================================================
function syncMeshes() {
  // Sync entities
  for (const e of entities) {
    const mesh = getOrCreateMesh(e);
    const pos = worldToScene(e.x, e.y);
    mesh.position.set(pos.x, pos.y, 0);
    mesh.scale.set(e.size, e.size, e.size);

    // Face movement direction for fish types
    if (e.vx !== undefined && e.vx !== 0 && !['clam', 'seashell', 'meat'].includes(e.type)) {
      mesh.rotation.y = e.vx > 0 ? 0 : Math.PI;
    }

    // Tail wag animation
    const tail = mesh.getObjectByName('tail');
    if (tail && e.swimTimer !== undefined) {
      const wagSpeed = e.type === 'whale' ? 3 : (e.type === 'clownfish' ? 10 : 6);
      tail.rotation.y = Math.sin((e.swimTimer || 0) * wagSpeed) * 0.3;
    }
  }

  // Sync player
  if (playerMesh && player.alive) {
    const pos = worldToScene(player.x, player.y);
    playerMesh.position.set(pos.x, pos.y, 0);
    playerMesh.scale.set(player.size, player.size, player.size);
    playerMesh.rotation.y = player.facingRight ? 0 : Math.PI;

    // Tail wag
    const tail = playerMesh.getObjectByName('tail');
    if (tail) {
      tail.rotation.y = Math.sin(player.swimTimer * 8) * 0.3;
    }

    // Bite indicator
    const biteGroup = playerMesh.getObjectByName('biteGroup');
    if (biteGroup) {
      biteGroup.visible = player.biting;
      if (player.biting) {
        const ring = biteGroup.getObjectByName('biteRing');
        if (ring) {
          const col = player.canHitSomething ? 0xffd700 : 0xffffff;
          ring.material.color.setHex(col);
          ring.material.opacity = player.biteCharged ? 0.6 + Math.sin(player.swimTimer * 10) * 0.2 : 0.4;
        }
        // Color teeth
        biteGroup.traverse((child) => {
          if (child.name === 'tooth') {
            child.material.color.setHex(player.canHitSomething ? 0xffd700 : 0xffffff);
          }
        });
      }
    }
  } else if (playerMesh && !player.alive) {
    playerMesh.position.set(-9999, -9999, -9999); // hide
  }

  // Sync family
  for (let i = 0; i < family.length; i++) {
    if (i >= familyMeshes.length) break;
    const f = family[i];
    const mesh = familyMeshes[i];
    const pos = worldToScene(f.x, f.y);
    mesh.position.set(pos.x, pos.y, 0);
    mesh.scale.set(f.size, f.size, f.size);
    const facingRight = f.x < player.x;
    mesh.rotation.y = facingRight ? 0 : Math.PI;

    const tail = mesh.getObjectByName('tail');
    if (tail) {
      tail.rotation.y = Math.sin(f.swimTimer * 8) * 0.3;
    }
  }

  // Clean up removed entities
  cleanupMeshes();
}

// ============================================================
// HUD DRAWING (2D overlay canvas)
// ============================================================
function drawHUD() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.save();

  // Coins (top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(10, 10, 100, 30, 8);
  ctx.fill();
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'left';
  ctx.fillText('\u{1FA99} ' + player.coins, 20, 31);

  // Sprint bar (top-right)
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(CANVAS_W - 140, 10, 130, 30, 8);
  ctx.fill();
  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'left';
  ctx.fillText('Sprint', CANVAS_W - 130, 23);
  const barX = CANVAS_W - 130;
  const barY = 27;
  const barW = 110;
  const barH = 7;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 3);
  ctx.fill();
  const pct = player.staminaLeft / SPRINT_MAX;
  if (pct > 0) {
    const grad = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0);
    grad.addColorStop(0, player.sprinting ? '#FF8800' : '#00BFFF');
    grad.addColorStop(1, player.sprinting ? '#FF4400' : '#00FF88');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * pct, barH, 3);
    ctx.fill();
  }

  // Stats (bottom-left)
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.roundRect(10, CANVAS_H - 50, 200, 40, 8);
  ctx.fill();

  ctx.font = '12px sans-serif';
  ctx.fillStyle = 'white';
  ctx.textAlign = 'left';
  ctx.fillText('Bite: ' + Math.floor(player.biteForce), 20, CANVAS_H - 32);

  // Health bar
  ctx.fillText('HP', 20, CANVAS_H - 17);
  const hpX = 42;
  const hpY = CANVAS_H - 25;
  const hpW = 100;
  const hpH = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(hpX, hpY, hpW, hpH, 3);
  ctx.fill();
  const hpPct = player.health / player.maxHealth;
  ctx.fillStyle = hpPct > 0.5 ? '#44CC44' : (hpPct > 0.25 ? '#CCAA22' : '#CC3333');
  ctx.beginPath();
  ctx.roundRect(hpX, hpY, hpW * hpPct, hpH, 3);
  ctx.fill();

  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText(Math.floor(player.health) + '/' + Math.floor(player.maxHealth), hpX + hpW + 8, CANVAS_H - 16);

  // Family indicator
  if (familyActive) {
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#88CCFF';
    ctx.fillText('Family: ON', 155, CANVAS_H - 32);
  }

  ctx.restore();
}

function drawDeathMenu() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const panelW = 260;
  const panelH = 200;
  const panelX = (CANVAS_W - panelW) / 2;
  const panelY = (CANVAS_H - panelH) / 2 - 20;

  ctx.fillStyle = 'rgba(20,30,50,0.9)';
  ctx.beginPath();
  ctx.roundRect(panelX, panelY, panelW, panelH, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#CC4444';
  ctx.fillText('You Got Eaten!', CANVAS_W / 2, panelY + 35);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('Coins earned: ' + coinsThisRun, CANVAS_W / 2, panelY + 65);

  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Total: ' + player.coins + ' coins', CANVAS_W / 2, panelY + 85);

  const btnW = 180;
  const btnH = 32;
  const btnX = (CANVAS_W - btnW) / 2;

  ctx.fillStyle = '#44AA44';
  ctx.beginPath();
  ctx.roundRect(btnX, panelY + 105, btnW, btnH, 6);
  ctx.fill();
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = 'white';
  ctx.fillText('Retry', CANVAS_W / 2, panelY + 127);

  ctx.fillStyle = '#AA8844';
  ctx.beginPath();
  ctx.roundRect(btnX, panelY + 145, btnW, btnH, 6);
  ctx.fill();
  ctx.font = 'bold 16px sans-serif';
  ctx.fillStyle = 'white';
  ctx.fillText('Shop', CANVAS_W / 2, panelY + 167);

  ctx.restore();
}

function drawShop() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillStyle = 'white';
  ctx.fillText('Fish Shop', CANVAS_W / 2, 45);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('Coins: ' + player.coins, CANVAS_W / 2, 70);

  const cardW = 250;
  const cardH = 55;
  const startX = (CANVAS_W - cardW) / 2;
  const startY = 90;
  const gap = 62;

  for (let i = 0; i < SHOP_FISH.length; i++) {
    const fish = SHOP_FISH[i];
    const cy = startY + i * gap;
    const owned = ownedFish.includes(i);
    const selected = i === selectedFish;
    const canBuy = !owned && player.coins >= fish.cost && (!fish.requireKill || localStorage.getItem(fish.requireKill));
    const locked = !owned && fish.requireKill && !localStorage.getItem(fish.requireKill);

    ctx.fillStyle = selected ? 'rgba(80,120,180,0.8)' : 'rgba(40,40,60,0.8)';
    ctx.beginPath();
    ctx.roundRect(startX, cy, cardW, cardH, 8);
    ctx.fill();
    if (selected) {
      ctx.strokeStyle = '#88BBFF';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    ctx.textAlign = 'left';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = locked ? '#666666' : 'white';
    ctx.fillText(fish.name, startX + 15, cy + 22);

    ctx.font = '12px sans-serif';
    if (owned && selected) {
      ctx.fillStyle = '#88FF88';
      ctx.fillText('Selected', startX + 15, cy + 40);
    } else if (owned) {
      ctx.fillStyle = '#88AACC';
      ctx.fillText('Owned - click to select', startX + 15, cy + 40);
    } else if (locked) {
      ctx.fillStyle = '#CC6666';
      ctx.fillText('Kill one to unlock', startX + 15, cy + 40);
    } else if (canBuy) {
      ctx.fillStyle = '#FFD700';
      ctx.fillText('Buy - ' + fish.cost + ' coins', startX + 15, cy + 40);
    } else {
      ctx.fillStyle = '#888888';
      ctx.fillText(fish.cost + ' coins (not enough)', startX + 15, cy + 40);
    }

    if (i === 0 && owned) {
      ctx.textAlign = 'right';
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#AAAAAA';
      ctx.fillText('Skin: ' + SHOP_FISH[0].skins[selectedSkin], startX + cardW - 15, cy + 22);
    }
  }

  ctx.textAlign = 'center';
  const backW = 120;
  const backH = 32;
  const backX = (CANVAS_W - backW) / 2;
  const backY = CANVAS_H - 60;
  ctx.fillStyle = '#666677';
  ctx.beginPath();
  ctx.roundRect(backX, backY, backW, backH, 6);
  ctx.fill();
  ctx.font = 'bold 15px sans-serif';
  ctx.fillStyle = 'white';
  ctx.fillText('Back', CANVAS_W / 2, backY + 22);

  ctx.restore();
}

function drawTitleScreen() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#22AAFF';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText('Deep Feast', CANVAS_W / 2, CANVAS_H / 2 - 40);

  ctx.shadowBlur = 0;
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#CCDDEE';
  ctx.fillText('Eat. Grow. Survive.', CANVAS_W / 2, CANVAS_H / 2);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#8899AA';
  ctx.fillText('Click or press any key to start', CANVAS_W / 2, CANVAS_H / 2 + 40);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = '#556677';
  ctx.fillText('WASD to swim \u00B7 Shift to sprint \u00B7 Click to bite \u00B7 F for family', CANVAS_W / 2, CANVAS_H / 2 + 70);

  ctx.restore();
}

// ============================================================
// LIGHT RAY ANIMATION
// ============================================================
function animateLightRays(time) {
  for (let i = 0; i < rayGroup.children.length; i++) {
    const ray = rayGroup.children[i];
    ray.material.opacity = 0.02 + Math.sin(time * 0.001 + i * 1.2) * 0.015;
  }
}

// ============================================================
// ENTITY HEALTH BARS (3D -> projected to HUD)
// ============================================================
function drawEntityHealthBars() {
  const tempVec = new THREE.Vector3();
  for (const e of entities) {
    if (e.health >= e.maxHealth) continue;
    if (!['orca', 'whale', 'megalodon', 'mosasaurus'].includes(e.type)) continue;

    const mesh = entityMeshMap.get(e);
    if (!mesh) continue;

    tempVec.setFromMatrixPosition(mesh.matrixWorld);
    tempVec.y += 20 * e.size;
    tempVec.project(camera);

    const sx = (tempVec.x * 0.5 + 0.5) * CANVAS_W;
    const sy = (-tempVec.y * 0.5 + 0.5) * CANVAS_H;

    if (tempVec.z > 1 || sx < -50 || sx > CANVAS_W + 50 || sy < -50 || sy > CANVAS_H + 50) continue;

    const barW = 40;
    const barH = 4;
    const bx = sx - barW / 2;
    const by = sy;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by, barW, barH);
    const pctHP = e.health / e.maxHealth;
    ctx.fillStyle = pctHP > 0.5 ? '#44CC44' : (pctHP > 0.25 ? '#CCAA22' : '#CC3333');
    ctx.fillRect(bx, by, barW * pctHP, barH);
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;
  accumulator += dt;

  while (accumulator >= FIXED_DT) {
    accumulator -= FIXED_DT;
    updateBubbles();
    if (gameStarted && gameState === STATE_PLAYING) {
      updatePlayerInput();
      updatePlayer();
      updateFamily();
      updateEntities();
      updateFishCombat();
      updateBiteCollision();
      updateLatch();
      updateEnemyDamage();
      updateRespawns();
      replenishCounter++;
      if (replenishCounter >= 60) {
        replenishCounter = 0;
        replenishFood();
      }
    }
  }

  // Sync 3D meshes from game state
  if (gameStarted) {
    syncMeshes();
    updateCamera3D();
  }

  // Animate environment
  animateLightRays(timestamp);

  // Render 3D scene
  renderer.render(scene, camera);

  // Draw 2D HUD overlay
  if (!gameStarted) {
    drawTitleScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameState === STATE_SHOP) {
    drawShop();
    overlay.classList.add('active');
  } else if (gameState === STATE_DEAD) {
    drawDeathMenu();
    overlay.classList.add('active');
  } else if (gameState === STATE_PLAYING) {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawHUD();
    drawEntityHealthBars();
    overlay.classList.remove('active');
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
initEntities();
initFamily();
initBubbles();
createPlayerMesh();
createFamilyMeshes();

// Initialize camera position
const initPos = worldToScene(player.x, player.y);
camPos.set(initPos.x - 180, initPos.y + 120, 280);

requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
</script>
