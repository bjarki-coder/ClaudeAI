<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Hawk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 400;
const CANVAS_H = 600;
const SCROLL_SPEED = 2;
const GROUND_H = 60;
const PILLAR_W = 60;
const GAP_SIZE = 130;
const PILLAR_SPACING = 220;
const PILLAR_MIN_TOP = 80;
const PILLAR_MAX_TOP = CANVAS_H - GROUND_H - GAP_SIZE - 80;
const HAWK_X = 80; // fixed horizontal position
const HAWK_W = 50;
const HAWK_H = 30;
const GRAVITY = 0.5;
const FLAP_STRENGTH = -8;
const MAX_FALL_SPEED = 10;
const MAX_ROTATION = Math.PI / 4;
const MIN_ROTATION = -Math.PI / 6;

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ============================================================
// GAME STATE
// ============================================================
let lastTime = 0;
let scrollX = 0;
let hawkY = CANVAS_H / 2;
let hawkVel = 0;
let hawkRotation = 0;
let wingState = 0; // 0=up, 1=level, 2=down
let wingTimer = 0;
const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_GAMEOVER = 2;
let gameState = STATE_TITLE;
let flapHoldTimer = 0;
let pillars = [];
let score = 0;
let bestScore = parseInt(localStorage.getItem('mountainHawkBest')) || 0;
let snowflakes = [];
let feathers = [];
let screenFlash = 0;
let deathAnimTimer = 0;
let deathHawkVel = 0;
let hawkCryTimer = 8 + Math.random() * 7;

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
let windNode = null;
let windGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startWind();
}

function startWind() {
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  windNode = audioCtx.createBufferSource();
  windNode.buffer = buffer;
  windNode.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;

  windGain = audioCtx.createGain();
  windGain.gain.value = 0.08;

  windNode.connect(filter);
  filter.connect(windGain);
  windGain.connect(audioCtx.destination);
  windNode.start();
}

function playFlap() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.1;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 0.5;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.15;

  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

function playChime() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 800;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

function playHawkCry() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.6);

  const vibrato = audioCtx.createOscillator();
  vibrato.frequency.value = 8;
  const vibratoGain = audioCtx.createGain();
  vibratoGain.gain.value = 30;
  vibrato.connect(vibratoGain);
  vibratoGain.connect(osc.frequency);
  vibrato.start();

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 2;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.6);
  vibrato.stop(audioCtx.currentTime + 0.6);
}

function playThud() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.08;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 200;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.3;

  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  source.start();
}

// ============================================================
// INPUT
// ============================================================
function handleFlap() {
  initAudio();
  if (gameState === STATE_TITLE) {
    gameState = STATE_PLAYING;
    hawkY = CANVAS_H / 2;
    hawkVel = 0;
    score = 0;
    pillars = [];
    for (let i = 0; i < 4; i++) {
      pillars.push({
        x: CANVAS_W + i * PILLAR_SPACING,
        topH: PILLAR_MIN_TOP + Math.random() * (PILLAR_MAX_TOP - PILLAR_MIN_TOP),
        scored: false
      });
    }
  }

  if (gameState === STATE_PLAYING) {
    hawkVel = FLAP_STRENGTH;
    flapHoldTimer = 0;
    playFlap();
  }

  if (gameState === STATE_GAMEOVER) {
    resetGame();
  }
}

function resetGame() {
  hawkY = CANVAS_H / 2;
  hawkVel = 0;
  hawkRotation = 0;
  scrollX = 0;
  pillars = [];
  gameState = STATE_TITLE;
}

canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleFlap(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleFlap(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); handleFlap(); }
});

// ============================================================
// PHYSICS
// ============================================================
function triggerDeath() {
  gameState = STATE_GAMEOVER;
  screenFlash = 0.6;
  deathAnimTimer = 0;
  deathHawkVel = -3;
  playThud();

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('mountainHawkBest', bestScore);
  }

  feathers = [];
  for (let i = 0; i < 10; i++) {
    feathers.push({
      x: HAWK_X,
      y: hawkY,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5,
      r: 1.5 + Math.random() * 2,
      color: Math.random() > 0.5 ? '#7A4E2A' : '#DDDDDD',
      life: 1.0
    });
  }
}

function updatePhysics() {
  if (gameState !== STATE_PLAYING) return;

  // Gravity
  hawkVel += GRAVITY;
  if (hawkVel > MAX_FALL_SPEED) hawkVel = MAX_FALL_SPEED;
  hawkY += hawkVel;

  // Rotation follows velocity
  const targetRotation = (hawkVel / MAX_FALL_SPEED) * MAX_ROTATION;
  hawkRotation += (targetRotation - hawkRotation) * 0.15;
  hawkRotation = Math.max(MIN_ROTATION, Math.min(MAX_ROTATION, hawkRotation));

  // Wing animation driven by physics
  flapHoldTimer += 1 / 60;
  if (flapHoldTimer < 0.1) {
    wingState = 0; // wings up right after flap
  } else if (hawkVel < 0) {
    wingState = 1; // level while rising
  } else {
    wingState = 2; // down while falling
  }

  // Pillar collision (bounding box, slightly forgiving)
  const hx = HAWK_X - 14;
  const hy = hawkY - 6;
  const hw = 32;
  const hh = 14;

  for (const p of pillars) {
    if (hx + hw > p.x && hx < p.x + PILLAR_W) {
      if (hy < p.topH || hy + hh > p.topH + GAP_SIZE) {
        triggerDeath();
        return;
      }
    }

    if (!p.scored && p.x + PILLAR_W < HAWK_X) {
      p.scored = true;
      score++;
      playChime();
    }
  }

  // Ground collision
  if (hawkY > CANVAS_H - GROUND_H - HAWK_H / 2) {
    hawkY = CANVAS_H - GROUND_H - HAWK_H / 2;
    triggerDeath();
  }

  // Ceiling collision
  if (hawkY < HAWK_H / 2) {
    hawkY = HAWK_H / 2;
    hawkVel = 0;
  }
}

function updatePillars() {
  if (gameState !== STATE_PLAYING) return;

  for (let i = 0; i < pillars.length; i++) {
    pillars[i].x -= SCROLL_SPEED;
  }

  if (pillars.length > 0 && pillars[0].x < -PILLAR_W) {
    pillars.shift();
    const lastX = pillars[pillars.length - 1].x;
    pillars.push({
      x: lastX + PILLAR_SPACING,
      topH: PILLAR_MIN_TOP + Math.random() * (PILLAR_MAX_TOP - PILLAR_MIN_TOP),
      scored: false
    });
  }
}

// ============================================================
// DRAWING FUNCTIONS
// ============================================================
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0,    '#5B86B8');
  grad.addColorStop(0.4,  '#8BACC8');
  grad.addColorStop(0.7,  '#B8C8D8');
  grad.addColorStop(1.0,  '#D8DDE4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawMountainLayer(scrollFactor, baseY, height, peakCount, color, snowColor) {
  const offset = (scrollX * scrollFactor) % CANVAS_W;

  for (let copy = -1; copy <= 1; copy++) {
    const shiftX = copy * CANVAS_W - offset;
    const peakSpacing = CANVAS_W / peakCount;

    // Collect peak positions
    const peaks = [];
    for (let i = 0; i <= peakCount; i++) {
      const px = shiftX + i * peakSpacing;
      const py = baseY - height * 0.4 - Math.sin(i * 2.7 + peakCount) * height * 0.6;
      peaks.push({ x: px, y: py });
    }

    // Draw filled mountain silhouette
    ctx.beginPath();
    ctx.moveTo(shiftX, CANVAS_H);
    ctx.lineTo(peaks[0].x, peaks[0].y);

    for (let i = 1; i < peaks.length; i++) {
      const cpx = (peaks[i - 1].x + peaks[i].x) / 2;
      const cpy = (peaks[i - 1].y + peaks[i].y) / 2;
      ctx.quadraticCurveTo(peaks[i - 1].x, peaks[i - 1].y, cpx, cpy);
    }

    const last = peaks[peaks.length - 1];
    ctx.lineTo(last.x, last.y);
    ctx.lineTo(last.x, CANVAS_H);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Draw snow caps
    if (snowColor) {
      for (let i = 0; i < peaks.length - 1; i++) {
        const px = peaks[i].x;
        const py = peaks[i].y;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - 12, py + 10);
        ctx.lineTo(px + 12, py + 10);
        ctx.closePath();
        ctx.fillStyle = snowColor;
        ctx.fill();
      }
    }
  }
}

function drawPineTrees(scrollFactor) {
  const treeBaseY = CANVAS_H - GROUND_H;
  const offset = (scrollX * scrollFactor) % CANVAS_W;
  const treeCount = 12;
  const treeSpacing = CANVAS_W / treeCount;

  for (let copy = -1; copy <= 1; copy++) {
    const shiftX = copy * CANVAS_W - offset;

    for (let i = 0; i < treeCount; i++) {
      const tx = shiftX + i * treeSpacing + treeSpacing / 2;
      const treeH = 25 + Math.sin(i * 3.1) * 15;
      const treeW = treeH * 0.5;
      const color = i % 2 === 0 ? '#1A3A0A' : '#2D5016';

      ctx.beginPath();
      ctx.moveTo(tx, treeBaseY - treeH);
      ctx.lineTo(tx - treeW, treeBaseY);
      ctx.lineTo(tx + treeW, treeBaseY);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }
  }
}

function drawGround() {
  const grad = ctx.createLinearGradient(0, CANVAS_H - GROUND_H, 0, CANVAS_H);
  grad.addColorStop(0,   '#C8C8C8');
  grad.addColorStop(1.0, '#FFFFFF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, CANVAS_H - GROUND_H, CANVAS_W, GROUND_H);
}

function drawHawk(x, y, rotation, wing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5C3A1E';
  ctx.fill();

  // Wings based on state
  ctx.fillStyle = '#7A4E2A';
  ctx.beginPath();
  if (wing === 0) {
    // Wings up
    ctx.moveTo(-8, -3);
    ctx.quadraticCurveTo(-18, -18, -24, -14);
    ctx.quadraticCurveTo(-16, -6, -8, -3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, -3);
    ctx.quadraticCurveTo(18, -18, 24, -14);
    ctx.quadraticCurveTo(16, -6, 8, -3);
  } else if (wing === 1) {
    // Wings level
    ctx.moveTo(-8, 0);
    ctx.quadraticCurveTo(-18, -4, -26, -1);
    ctx.quadraticCurveTo(-18, 2, -8, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.quadraticCurveTo(18, -4, 26, -1);
    ctx.quadraticCurveTo(18, 2, 8, 0);
  } else {
    // Wings down
    ctx.moveTo(-8, 3);
    ctx.quadraticCurveTo(-18, 14, -22, 16);
    ctx.quadraticCurveTo(-16, 8, -8, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, 3);
    ctx.quadraticCurveTo(18, 14, 22, 16);
    ctx.quadraticCurveTo(16, 8, 8, 3);
  }
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(14, -2, 7, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#4A2E14';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(20, -3);
  ctx.lineTo(27, -1);
  ctx.lineTo(20, 1);
  ctx.closePath();
  ctx.fillStyle = '#DAA520';
  ctx.fill();

  // Eye
  ctx.beginPath();
  ctx.arc(16, -4, 1.8, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(16, -4, 0.8, 0, Math.PI * 2);
  ctx.fillStyle = 'black';
  ctx.fill();

  ctx.restore();
}

function drawPillar(x, topH) {
  const bottomY = topH + GAP_SIZE;
  const bottomH = CANVAS_H - GROUND_H - bottomY;

  // Top pillar
  const topGrad = ctx.createLinearGradient(x, 0, x + PILLAR_W, 0);
  topGrad.addColorStop(0, '#5A5A5A');
  topGrad.addColorStop(0.5, '#7A7A7A');
  topGrad.addColorStop(1, '#5A5A5A');
  ctx.fillStyle = topGrad;
  ctx.fillRect(x, 0, PILLAR_W, topH);

  // Top pillar snow
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(x + PILLAR_W / 2, topH, PILLAR_W / 2 + 4, 8, 0, 0, Math.PI);
  ctx.fill();

  // Bottom pillar
  const botGrad = ctx.createLinearGradient(x, bottomY, x + PILLAR_W, bottomY);
  botGrad.addColorStop(0, '#5A5A5A');
  botGrad.addColorStop(0.5, '#7A7A7A');
  botGrad.addColorStop(1, '#5A5A5A');
  ctx.fillStyle = botGrad;
  ctx.fillRect(x, bottomY, PILLAR_W, bottomH);

  // Bottom pillar snow cap
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(x + PILLAR_W / 2, bottomY, PILLAR_W / 2 + 4, 8, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Subtle shadow on left side
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(x, 0, 6, topH);
  ctx.fillRect(x, bottomY, 6, bottomH);
}

function drawPillars() {
  for (const p of pillars) {
    drawPillar(p.x, p.topH);
  }
}

function initSnowflakes() {
  snowflakes = [];
  for (let i = 0; i < 40; i++) {
    snowflakes.push({
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      r: 1 + Math.random() * 2,
      speed: 0.3 + Math.random() * 1,
      drift: -0.3 - Math.random() * 0.5,
      opacity: 0.3 + Math.random() * 0.5
    });
  }
}

function updateSnowflakes() {
  for (const s of snowflakes) {
    s.y += s.speed;
    s.x += s.drift;
    if (s.y > CANVAS_H) {
      s.y = -5;
      s.x = Math.random() * CANVAS_W;
    }
    if (s.x < -5) {
      s.x = CANVAS_W + 5;
    }
  }
}

function drawSnowflakes() {
  for (const s of snowflakes) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
    ctx.fill();
  }
}

function drawBackground() {
  drawSky();
  drawMountainLayer(0.2, CANVAS_H - 100, 140, 8,  'rgba(160,170,185,0.7)',  'rgba(255,255,255,0.6)');
  drawMountainLayer(0.5, CANVAS_H - 70,  120, 10, 'rgba(120,130,145,0.85)', 'rgba(255,255,255,0.8)');
  drawPineTrees(0.8);
  drawGround();
}

function drawScore() {
  ctx.save();
  ctx.font = 'bold 48px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'white';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.fillText(score, CANVAS_W / 2, 60);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  const panelW = 220;
  const panelH = 160;
  const panelX = (CANVAS_W - panelW) / 2;
  const panelY = (CANVAS_H - panelH) / 2 - 30;

  ctx.fillStyle = 'rgba(30,30,50,0.9)';
  ctx.beginPath();
  ctx.roundRect(panelX, panelY, panelW, panelH, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 24px sans-serif';
  ctx.fillStyle = '#CC4444';
  ctx.fillText('Game Over', CANVAS_W / 2, panelY + 35);

  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('Score', CANVAS_W / 2, panelY + 65);

  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = 'white';
  ctx.fillText(score, CANVAS_W / 2, panelY + 100);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#88AACC';
  ctx.fillText('Best: ' + bestScore, CANVAS_W / 2, panelY + 125);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#888888';
  ctx.fillText('Click to Retry', CANVAS_W / 2, panelY + panelH + 30);

  ctx.restore();
}

function drawTitle() {
  ctx.save();
  ctx.textAlign = 'center';

  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = 'white';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.fillText('Mountain Hawk', CANVAS_W / 2, 120);

  ctx.shadowBlur = 0;
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#CCCCCC';
  ctx.fillText('Click or press Space to start', CANVAS_W / 2, CANVAS_H - 100);

  if (bestScore > 0) {
    ctx.font = '14px sans-serif';
    ctx.fillStyle = '#88AACC';
    ctx.fillText('Best: ' + bestScore, CANVAS_W / 2, CANVAS_H - 70);
  }

  ctx.restore();
}

function updateDeathEffects(dt) {
  if (gameState !== STATE_GAMEOVER) return;

  if (screenFlash > 0) {
    screenFlash -= dt * 4;
    if (screenFlash < 0) screenFlash = 0;
  }

  for (const f of feathers) {
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.2;
    f.life -= dt * 1.2;
  }
  feathers = feathers.filter(f => f.life > 0);

  deathAnimTimer += dt;
  deathHawkVel += 0.3;
  hawkY += deathHawkVel;
  hawkRotation += 0.1;
  if (hawkY > CANVAS_H - GROUND_H - HAWK_H / 2) {
    hawkY = CANVAS_H - GROUND_H - HAWK_H / 2;
    deathHawkVel = 0;
  }
}

function drawFeathers() {
  for (const f of feathers) {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawScreenFlash() {
  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${screenFlash})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // Update
  if (gameState === STATE_PLAYING) {
    scrollX += SCROLL_SPEED;
    hawkCryTimer -= dt;
    if (hawkCryTimer <= 0) {
      playHawkCry();
      hawkCryTimer = 8 + Math.random() * 7;
    }
  }
  updatePhysics();
  updatePillars();
  updateDeathEffects(dt);
  updateSnowflakes();

  // Title screen: hawk bobs gently
  if (gameState === STATE_TITLE) {
    hawkY = CANVAS_H / 2 + Math.sin(timestamp / 300) * 15;
    wingTimer += dt;
    if (wingTimer > 0.3) { wingTimer = 0; wingState = (wingState + 1) % 3; }
  }

  // Draw
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground();
  drawPillars();
  drawSnowflakes();
  drawHawk(HAWK_X, hawkY, hawkRotation, wingState);
  drawFeathers();
  drawScreenFlash();

  // UI overlays
  if (gameState === STATE_TITLE) {
    drawTitle();
  } else if (gameState === STATE_PLAYING) {
    drawScore();
  } else if (gameState === STATE_GAMEOVER) {
    drawScore();
    if (deathAnimTimer > 1.0) {
      drawGameOver();
    }
  }

  requestAnimationFrame(gameLoop);
}

initSnowflakes();
requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
</script>
