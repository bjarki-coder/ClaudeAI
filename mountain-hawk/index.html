<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mountain Hawk</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
// ============================================================
// CONSTANTS
// ============================================================
const CANVAS_W = 400;
const CANVAS_H = 600;
const SCROLL_SPEED = 2;
const GROUND_H = 60;
const HAWK_X = 80; // fixed horizontal position
const HAWK_W = 50;
const HAWK_H = 30;
const GRAVITY = 0.5;
const FLAP_STRENGTH = -8;
const MAX_FALL_SPEED = 10;
const MAX_ROTATION = Math.PI / 4;
const MIN_ROTATION = -Math.PI / 6;

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ============================================================
// GAME STATE
// ============================================================
let lastTime = 0;
let scrollX = 0;
let hawkY = CANVAS_H / 2;
let hawkVel = 0;
let hawkRotation = 0;
let wingState = 0; // 0=up, 1=level, 2=down
let wingTimer = 0;
const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_GAMEOVER = 2;
let gameState = STATE_TITLE;
let flapHoldTimer = 0;

// ============================================================
// INPUT
// ============================================================
function handleFlap() {
  if (gameState === STATE_TITLE) {
    gameState = STATE_PLAYING;
    hawkY = CANVAS_H / 2;
    hawkVel = 0;
  }

  if (gameState === STATE_PLAYING) {
    hawkVel = FLAP_STRENGTH;
    flapHoldTimer = 0;
  }

  if (gameState === STATE_GAMEOVER) {
    resetGame();
  }
}

function resetGame() {
  hawkY = CANVAS_H / 2;
  hawkVel = 0;
  hawkRotation = 0;
  scrollX = 0;
  gameState = STATE_TITLE;
}

canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleFlap(); });
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleFlap(); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); handleFlap(); }
});

// ============================================================
// PHYSICS
// ============================================================
function updatePhysics() {
  if (gameState !== STATE_PLAYING) return;

  // Gravity
  hawkVel += GRAVITY;
  if (hawkVel > MAX_FALL_SPEED) hawkVel = MAX_FALL_SPEED;
  hawkY += hawkVel;

  // Rotation follows velocity
  const targetRotation = (hawkVel / MAX_FALL_SPEED) * MAX_ROTATION;
  hawkRotation += (targetRotation - hawkRotation) * 0.15;
  hawkRotation = Math.max(MIN_ROTATION, Math.min(MAX_ROTATION, hawkRotation));

  // Wing animation driven by physics
  flapHoldTimer += 1 / 60;
  if (flapHoldTimer < 0.1) {
    wingState = 0; // wings up right after flap
  } else if (hawkVel < 0) {
    wingState = 1; // level while rising
  } else {
    wingState = 2; // down while falling
  }

  // Ground collision
  if (hawkY > CANVAS_H - GROUND_H - HAWK_H / 2) {
    hawkY = CANVAS_H - GROUND_H - HAWK_H / 2;
    gameState = STATE_GAMEOVER;
  }

  // Ceiling collision
  if (hawkY < HAWK_H / 2) {
    hawkY = HAWK_H / 2;
    hawkVel = 0;
  }
}

// ============================================================
// DRAWING FUNCTIONS
// ============================================================
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0,    '#5B86B8');
  grad.addColorStop(0.4,  '#8BACC8');
  grad.addColorStop(0.7,  '#B8C8D8');
  grad.addColorStop(1.0,  '#D8DDE4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
}

function drawMountainLayer(scrollFactor, baseY, height, peakCount, color, snowColor) {
  const offset = (scrollX * scrollFactor) % CANVAS_W;

  for (let copy = -1; copy <= 1; copy++) {
    const shiftX = copy * CANVAS_W - offset;
    const peakSpacing = CANVAS_W / peakCount;

    // Collect peak positions
    const peaks = [];
    for (let i = 0; i <= peakCount; i++) {
      const px = shiftX + i * peakSpacing;
      const py = baseY - height * 0.4 - Math.sin(i * 2.7 + peakCount) * height * 0.6;
      peaks.push({ x: px, y: py });
    }

    // Draw filled mountain silhouette
    ctx.beginPath();
    ctx.moveTo(shiftX, CANVAS_H);
    ctx.lineTo(peaks[0].x, peaks[0].y);

    for (let i = 1; i < peaks.length; i++) {
      const cpx = (peaks[i - 1].x + peaks[i].x) / 2;
      const cpy = (peaks[i - 1].y + peaks[i].y) / 2;
      ctx.quadraticCurveTo(peaks[i - 1].x, peaks[i - 1].y, cpx, cpy);
    }

    const last = peaks[peaks.length - 1];
    ctx.lineTo(last.x, last.y);
    ctx.lineTo(last.x, CANVAS_H);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Draw snow caps
    if (snowColor) {
      for (let i = 0; i < peaks.length - 1; i++) {
        const px = peaks[i].x;
        const py = peaks[i].y;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - 12, py + 10);
        ctx.lineTo(px + 12, py + 10);
        ctx.closePath();
        ctx.fillStyle = snowColor;
        ctx.fill();
      }
    }
  }
}

function drawPineTrees(scrollFactor) {
  const treeBaseY = CANVAS_H - GROUND_H;
  const offset = (scrollX * scrollFactor) % CANVAS_W;
  const treeCount = 12;
  const treeSpacing = CANVAS_W / treeCount;

  for (let copy = -1; copy <= 1; copy++) {
    const shiftX = copy * CANVAS_W - offset;

    for (let i = 0; i < treeCount; i++) {
      const tx = shiftX + i * treeSpacing + treeSpacing / 2;
      const treeH = 25 + Math.sin(i * 3.1) * 15;
      const treeW = treeH * 0.5;
      const color = i % 2 === 0 ? '#1A3A0A' : '#2D5016';

      ctx.beginPath();
      ctx.moveTo(tx, treeBaseY - treeH);
      ctx.lineTo(tx - treeW, treeBaseY);
      ctx.lineTo(tx + treeW, treeBaseY);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }
  }
}

function drawGround() {
  const grad = ctx.createLinearGradient(0, CANVAS_H - GROUND_H, 0, CANVAS_H);
  grad.addColorStop(0,   '#C8C8C8');
  grad.addColorStop(1.0, '#FFFFFF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, CANVAS_H - GROUND_H, CANVAS_W, GROUND_H);
}

function drawHawk(x, y, rotation, wing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#5C3A1E';
  ctx.fill();

  // Wings based on state
  ctx.fillStyle = '#7A4E2A';
  ctx.beginPath();
  if (wing === 0) {
    // Wings up
    ctx.moveTo(-8, -3);
    ctx.quadraticCurveTo(-18, -18, -24, -14);
    ctx.quadraticCurveTo(-16, -6, -8, -3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, -3);
    ctx.quadraticCurveTo(18, -18, 24, -14);
    ctx.quadraticCurveTo(16, -6, 8, -3);
  } else if (wing === 1) {
    // Wings level
    ctx.moveTo(-8, 0);
    ctx.quadraticCurveTo(-18, -4, -26, -1);
    ctx.quadraticCurveTo(-18, 2, -8, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.quadraticCurveTo(18, -4, 26, -1);
    ctx.quadraticCurveTo(18, 2, 8, 0);
  } else {
    // Wings down
    ctx.moveTo(-8, 3);
    ctx.quadraticCurveTo(-18, 14, -22, 16);
    ctx.quadraticCurveTo(-16, 8, -8, 3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8, 3);
    ctx.quadraticCurveTo(18, 14, 22, 16);
    ctx.quadraticCurveTo(16, 8, 8, 3);
  }
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(14, -2, 7, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#4A2E14';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(20, -3);
  ctx.lineTo(27, -1);
  ctx.lineTo(20, 1);
  ctx.closePath();
  ctx.fillStyle = '#DAA520';
  ctx.fill();

  // Eye
  ctx.beginPath();
  ctx.arc(16, -4, 1.8, 0, Math.PI * 2);
  ctx.fillStyle = '#FFD700';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(16, -4, 0.8, 0, Math.PI * 2);
  ctx.fillStyle = 'black';
  ctx.fill();

  ctx.restore();
}

function drawBackground() {
  drawSky();
  drawMountainLayer(0.2, CANVAS_H - 100, 140, 8,  'rgba(160,170,185,0.7)',  'rgba(255,255,255,0.6)');
  drawMountainLayer(0.5, CANVAS_H - 70,  120, 10, 'rgba(120,130,145,0.85)', 'rgba(255,255,255,0.8)');
  drawPineTrees(0.8);
  drawGround();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  // Update
  if (gameState === STATE_PLAYING) {
    scrollX += SCROLL_SPEED;
  }
  updatePhysics();

  // Title screen: hawk bobs gently
  if (gameState === STATE_TITLE) {
    hawkY = CANVAS_H / 2 + Math.sin(timestamp / 300) * 15;
    wingTimer += dt;
    if (wingTimer > 0.3) { wingTimer = 0; wingState = (wingState + 1) % 3; }
  }

  // Draw
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground();
  drawHawk(HAWK_X, hawkY, hawkRotation, wingState);

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
</script>
</body>
</html>
